# Harness Bundle manifest (L5 -- distribution layer).
# A bundle packages a versioned, governed harness setup (agents + skills +
# hooks + control policies + contracts + schemas) so a whole team/project gets
# a consistent, reviewed configuration in one install -- the "npm package for
# agent capabilities" from the 5-layer toolkit model, but with governance.
#
# `provides` lists glob patterns (relative to the source harness root) that
# pack.ps1 collects into a portable .bundle.json artifact; install.ps1
# materializes them back into a target project.
schema_version: "1.0.0"
name: "standard-governance"
version: "1.5.0"
description: "Baseline enterprise-governance harness: 9-agent fleet, 6 hooks (self-healing transcript-driven token sampling — case-insensitive, recursive incl. subagents; guard fail-open on bad regex; guard scans shell commands only — no false positives on file writes; 30 hardened deny patterns for RCE/exfil/persistence/container-escape/SSRF/ledger-tamper) + push-telemetry client for Portal sync. CASAN uplift policy pack (casan-policies.yaml + schema) closing H1/H2/H3/H6/H7 gaps: context pointer-store, tool idempotency/rate-limit, evaluation golden-set+regression-gate, agentops anomaly+hallucination thresholds, orchestration model-fallback+rollback. v1.4.0 adds server-side PDP enforcement (opt-in hook consult): H4 outbound allowlist enforced, H5 approval workflow (deploy/DB-write held for admin approve/reject), H6 real cost-anomaly alerts (incident + email) — raising CASAN to ~81, Level 4 Automated. v1.4.1 makes three declarations real, shipped mechanisms: H1 SessionStart hook builds .harness/context/pipeline-context.yaml pointer-store; H6 per-model drift detection + webhook/Slack alert delivery; H7 callable model-fallback resolver + git rollback restore-point (harness-rollback, harness-model-fallback) — CASAN ~82. v1.4.2 upgrades H1 with a local retrieval index (harness_rag.py: BM25 default + pluggable neural via HARNESS_EMBED_CMD, harness-context-query) over docs/spec/contracts so agents retrieve relevant chunks instead of re-scanning — CASAN ~83. v1.4.3 adds H3 server-side release gate: the PDP denies deploy/rollback unless required regression suites are green + judge verdict not REJECTED (evaluation_gate). Installer auto-scaffolds ready-to-edit .harness/portal-sync.json (incl. pdp_enforce:false) + empty portal-sync.key and gitignores the key (C5). v1.4.7 closes two evidence-transmission gaps for push-based projects: H1 client source<->doc scanner (harness_docscan.py — emits only real on-disk source/doc pairs with actual mtime staleness, never fabricated 'missing') and H3 evidence-bundle push (.harness/ledger/bundles/*.json -> prompt_scores); push-telemetry sends both. v1.4.8 adds harness-eval (ps1+sh): a real test-suite runner that runs declared casan-policies suite_commands or auto-detects pytest/npm, parses honest pass/fail/skip into test-reports.jsonl, and writes NO report when nothing runs (no fabricated green). v1.4.9 (M6) adds mandatory bug logging: ships a buglist.md template (installer scaffolds it at the project root), a constitution rule requiring the AI to log every bug it finds OR introduces (🤖) into buglist.md, and push-telemetry sends buglist.md → the Portal ingests it into a per-project Bug tab + an org-wide Common Bug view (recurring/important bugs common-ized: content, cause, fix, suggestion). v1.5.0 makes the release gate satisfiable straight from the bundle and deepens H3: two generic suites now ship and run with stdlib Python only -- policy-ci (harness_policy_check.py: every control file parses, C8 schema-backed + satisfied, C4 licensed model IDs, C10 all seven H-layers declare enforced_at, H1 pointer-store contract, C5 no hardcoded secrets) and red-team (harness_redteam.py: drives THIS project's installed guards with 12 real attack payloads and asserts they exit 2, plus a benign command that must pass) -- so a freshly onboarded project can prove its guards block instead of assuming it; the golden dataset now ships too (.harness/eval/**). H3 judge scoring gains the 5 rubric dimensions end to end (skill -> evidence bundle -> ledger -> Portal), and hard-gate now ENFORCES the rule rather than trusting the verdict label (overall <60 REJECTED; <80 or any dimension <60 CHANGES_REQUIRED). H1 discovery moved from hardcoded scans into casan-policies data (artifact_globs/source_globs/srs_candidates/spec_candidates): a glob match that is a file contributes its parent directory, so */__init__.py finds the package on non-src layouts, canonical paths win over globs and glob matches sort ordinally, making the pointer store deterministic and identical across bash and PowerShell. The installer now scaffolds the H1 pointer store on install. H4 control policies, contract templates, JSON schemas."
maintainer: "Dau Sy Manh <manhds@>"

provides:
  agents:
    - ".claude/agents/*.md"
  skills:
    - ".claude/skills/**"
  hooks:
    # settings.json = Windows (powershell) hooks; settings.posix.json = bash
    # hooks. install.sh selects the posix one on macOS/Linux; install.ps1 keeps
    # the Windows one. Both use the current Claude Code hook schema
    # (array of {matcher, hooks:[{type:command, command, args}]}).
    - ".claude/settings.json"
    - ".claude/settings.posix.json"
  control:
    - ".harness/control/*.json"
    - ".harness/control/*.yaml"
  schemas:
    - ".harness/schemas/*.json"
  scripts:
    - ".harness/scripts/powershell/*.ps1"
  scripts-posix:
    - ".harness/scripts/bash/*.sh"
  scripts-lib:
    - ".harness/scripts/lib/*.py"
  # The golden-set dataset the `golden` regression suite asserts against. Without
  # it a governed project would inherit a REQUIRED suite it cannot run.
  eval:
    - ".harness/eval/golden/*"
    - ".harness/eval/judge/*"
  contracts:
    - "contracts/*.yaml"
  # In-project copy of the installer/uninstaller/PM-lock (both shells) so a
  # governed project can uninstall itself in place: uninstall reads the install
  # receipt (.harness/.bundle-manifest.json), no original .bundle.json needed.
  tooling:
    - "tools/harness-bundle/install.ps1"
    - "tools/harness-bundle/install.sh"
    - "tools/harness-bundle/uninstall.ps1"
    - "tools/harness-bundle/uninstall.sh"
    - "tools/harness-bundle/harness-lock.ps1"
    - "tools/harness-bundle/harness-lock.sh"
    - "tools/harness-bundle/harness-verify.ps1"
    - "tools/harness-bundle/harness-verify.sh"
  memory:
    - ".harness/memory/constitution.md"
  templates:
    - ".harness/templates/*"
  # Common, project-agnostic governance reference (distinct name from a
  # project's own CLAUDE.md so install never overwrites it). Compare/copy from.
  governance-guide:
    - "CLAUDE.harness.md"
